<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" width="520" height="440" role="img" aria-label="Blink Reminder — Minimal theme popup">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- dimmed screen background -->
  <rect width="520" height="440" fill="#0d0d0f"/>
  <rect width="520" height="440" fill="#000" opacity="0.35"/>

  <!-- popup -->
  <g transform="translate(90, 75)" filter="url(#shadow)" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif">
    <rect width="340" height="290" rx="14" fill="rgba(18,18,20,0.97)"/>

    <!-- Skip -->
    <text x="314" y="28" fill="rgba(255,255,255,0.45)" font-size="12" text-anchor="end">Skip</text>

    <!-- Eye -->
    <g transform="translate(128, 34)">
      <path d="M4 30 Q 50 -2 96 30 Q 50 62 4 30 Z" fill="#f5f5f7"/>
      <circle cx="50" cy="30" r="17" fill="#4aa3ff"/>
      <circle cx="50" cy="30" r="9" fill="#121218"/>
      <circle cx="54.5" cy="25" r="3" fill="#ffffff" opacity="0.95"/>
      <circle cx="46" cy="33" r="1.4" fill="#ffffff" opacity="0.6"/>
    </g>

    <!-- Title -->
    <text x="170" y="122" fill="rgba(255,255,255,0.5)"
          font-size="13" letter-spacing="2" text-anchor="middle">20 · 20 · 20</text>

    <!-- Body -->
    <text x="170" y="156" fill="rgba(255,255,255,0.9)"
          font-size="15" text-anchor="middle">Look 20 feet away for 20 seconds.</text>
    <text x="170" y="178" fill="rgba(255,255,255,0.9)"
          font-size="15" text-anchor="middle">Classic 20-20-20.</text>

    <!-- Count -->
    <text x="170" y="255" fill="#f1f1f2"
          font-size="62" text-anchor="middle" font-weight="200" letter-spacing="-2">20</text>
  </g>
</svg>
