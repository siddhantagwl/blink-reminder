<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 460" width="540" height="460" role="img" aria-label="Blink Reminder — HUD theme popup">
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="3" height="3">
      <rect width="3" height="2" fill="transparent"/>
      <rect y="2" width="3" height="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <filter id="hudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feFlood flood-color="#00ff88" flood-opacity="0.15"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1.5"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- dimmed screen background -->
  <rect width="540" height="460" fill="#06080c"/>
  <rect width="540" height="460" fill="#000" opacity="0.35"/>

  <!-- popup -->
  <g transform="translate(90, 70)" filter="url(#hudShadow)">
    <rect width="360" height="320" rx="14" fill="rgba(6,10,18,0.97)"
          stroke="rgba(0,255,136,0.22)" stroke-width="1"/>
    <rect width="360" height="320" rx="14" fill="url(#scanlines)"/>

    <!-- Corner brackets -->
    <g stroke="#00ff88" stroke-width="1.5" fill="none" stroke-linecap="round">
      <path d="M 10 26 L 10 10 L 26 10"/>
      <path d="M 334 10 L 350 10 L 350 26"/>
      <path d="M 10 294 L 10 310 L 26 310"/>
      <path d="M 334 310 L 350 310 L 350 294"/>
    </g>

    <!-- Skip button -->
    <g transform="translate(286, 12)">
      <rect width="52" height="20" rx="3" fill="none"
            stroke="rgba(0,255,136,0.3)" stroke-width="1"/>
      <text x="26" y="14" fill="rgba(0,255,136,0.75)"
            font-size="9" letter-spacing="2" text-anchor="middle"
            font-family="'SF Mono', Menlo, monospace">SKIP</text>
    </g>

    <!-- Eye (glow ring behind) -->
    <g transform="translate(144, 32)">
      <path d="M4 30 Q 50 -2 96 30 Q 50 62 4 30 Z"
            fill="#061018" stroke="#00ff88" stroke-width="1"/>
      <circle cx="50" cy="30" r="17" fill="#00ff88"/>
      <circle cx="50" cy="30" r="9"  fill="#040812"/>
      <circle cx="54.5" cy="25" r="3" fill="#ffffff" opacity="0.95"/>
    </g>

    <!-- Title -->
    <text x="180" y="120" fill="#00ff88"
          font-size="11" letter-spacing="3" text-anchor="middle"
          font-family="'SF Mono', Menlo, monospace"
          filter="url(#textGlow)">// 20 · 20 · 20 //</text>

    <!-- Body -->
    <text x="180" y="152" fill="rgba(255,255,255,0.8)"
          font-size="15" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif">Look 20 feet away for 20 seconds.</text>
    <text x="180" y="172" fill="rgba(255,255,255,0.8)"
          font-size="15" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif">Classic 20-20-20.</text>

    <!-- Countdown ring -->
    <g transform="translate(130, 192)">
      <circle cx="50" cy="50" r="44" fill="none"
              stroke="rgba(0,255,136,0.18)" stroke-width="2.5"/>
      <!-- progress shown at ~75% remaining (15s of 20s) -->
      <circle cx="50" cy="50" r="44" fill="none"
              stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"
              stroke-dasharray="276.46" stroke-dashoffset="69.11"
              transform="rotate(-90 50 50)"
              filter="url(#textGlow)"/>
      <text x="50" y="62" fill="#00ff88"
            font-size="38" text-anchor="middle" font-weight="300"
            font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
            filter="url(#textGlow)">15</text>
    </g>
  </g>
</svg>
